name: ZAnime Build Unsigned IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # يتيح لك تشغيل البناء يدوياً من GitHub

jobs:
  build:
    name: Build Unsigned IPA
    runs-on: macos-15
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Debug - List Files (To Verify Structure)
        run: |
          echo "Current Directory Structure:"
          find . -maxdepth 3 -not -path '*/.*'

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project ZAnime.xcodeproj \
            -scheme ZAnime \
            -archivePath build/ZAnime.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Prepare IPA Structure
        run: |
          mkdir -p Payload
          if [ -d "build/ZAnime.xcarchive/Products/Applications/ZAnime.app" ]; then
            cp -r build/ZAnime.xcarchive/Products/Applications/ZAnime.app Payload/
            zip -r ZAnime_Unsigned.ipa Payload
          else
            echo "Error: ZAnime.app not found in archive!"
            exit 1
          fi

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZAnime-Unsigned-IPA
          path: ZAnime_Unsigned.ipa
