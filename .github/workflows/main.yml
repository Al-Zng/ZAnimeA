name: ZAnime Build Unsigned IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Unsigned IPA
    runs-on: macos-15
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Build Archive
        run: |
          # هذه الخطوة تبحث عن ملف الـ xcodeproj أينما كان وتدخل لمجلده
          PROJECT_PATH=$(find . -name "*.xcodeproj" -print -quit)
          PROJECT_DIR=$(dirname "$PROJECT_PATH")
          
          echo "Found project at: $PROJECT_PATH"
          cd "$PROJECT_DIR"
          
          xcodebuild archive \
            -project *.xcodeproj \
            -scheme ZAnime \
            -archivePath build/ZAnime.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Prepare IPA Structure
        run: |
          # البحث عن الـ .app الناتج وضغطه
          APP_PATH=$(find . -name "ZAnime.app" -type d -path "*/build/*" -print -quit)
          
          if [ -n "$APP_PATH" ]; then
            mkdir -p Payload
            cp -r "$APP_PATH" Payload/
            zip -r ZAnime_Unsigned.ipa Payload
          else
            echo "Error: Could not find ZAnime.app"
            exit 1
          fi

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZAnime-Unsigned-IPA
          path: ZAnime_Unsigned.ipa
